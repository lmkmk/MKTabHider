name: Build MKTabHider

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install dpkg ldid

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos --depth 1

      - name: Download SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -L -o /tmp/sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C ~/theos/sdks/
          echo "=== SDK contents ==="
          ls ~/theos/sdks/

      - name: Build
        env:
          THEOS: /Users/runner/theos
        run: |
          echo "THEOS=$THEOS"
          ls $THEOS/sdks/iPhoneOS16.5.sdk/ | head -5
          make package FINALPACKAGE=1

      - name: Extract dylib
        if: success()
        run: |
          cd packages
          ar x *.deb
          tar xf data.tar.*
          mkdir -p ../output
          cp Library/MobileSubstrate/DynamicLibraries/MKTabHider.dylib ../output/
          cp Library/MobileSubstrate/DynamicLibraries/MKTabHider.plist ../output/ 2>/dev/null || true

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MKTabHider
          path: |
            output/
            packages/*.deb
